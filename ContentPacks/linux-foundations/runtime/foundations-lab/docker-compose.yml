services:
  lab:
    build:
      context: .
    privileged: true
    cgroup: host
    command: ["/lib/systemd/systemd"]
    stop_signal: SIGRTMIN+3
    stop_grace_period: 30s
    tmpfs:
      - /run
      - /run/lock
      - /tmp
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    ports:
      - "127.0.0.1::22"
      - "127.0.0.1::8080"

services:
  beaconkeeper:
    build:
      context: .
      args:
        BEACON_SEED: ${BEACON_SEED:-opscoach-beaconkeeper}
    hostname: harbor
    privileged: true
    cgroup: host
    security_opt:
      - seccomp:unconfined
    tmpfs:
      - /run
      - /run/lock
      - /tmp
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    ports:
      - "127.0.0.1::22"
      - "127.0.0.1::80"
    command: ["/lib/systemd/systemd"]
    stop_signal: SIGRTMIN+3
    stop_grace_period: 30s

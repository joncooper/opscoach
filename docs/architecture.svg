<svg viewBox="0 0 1200 880" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <title id="t">OpsCoach AWS architecture</title>
  <desc id="d">A user reaches a shared Application Load Balancer with Cognito auth and a passphrase gate, which forwards to the OpsCoach web service on ECS Fargate in a private subnet. Fargate uses an isolated-subnet RDS PostgreSQL database, launches per-session EC2 lab hosts in a public subnet (which pull a lab container from ECR and call back via Cloud Map), bridges the browser terminal to the host over SSH, runs a grader over SSH, and schedules automatic teardown via EventBridge Scheduler and a terminator Lambda.</desc>

  <defs>
    <marker id="ae" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#16202C"/></marker>
    <marker id="as" markerWidth="9" markerHeight="9" refX="0" refY="3" orient="auto-start-reverse" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#16202C"/></marker>
    <marker id="aeg" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#90A0B0"/></marker>
  </defs>

  <style>
    .svc  { font-size:13px; font-weight:600; fill:#16202C; }
    .sub  { font-size:10.5px; font-weight:400; fill:#5C6B7A; }
    .grp  { font-size:11px;  font-weight:700; }
    .albl { font-size:10px;  font-weight:600; fill:#37485A; }
    .badge{ font-size:11px;  font-weight:700; fill:#FFFFFF; }
    .h1   { font-size:22px;  font-weight:700; fill:#16202C; }
    .h2   { font-size:12.5px; font-weight:400; fill:#5C6B7A; }
    .card { fill:#FFFFFF; stroke-width:1.6; rx:9; }
    .flow { stroke:#16202C; stroke-width:1.7; fill:none; }
    .supp { stroke:#90A0B0; stroke-width:1.3; fill:none; stroke-dasharray:4 3; }
  </style>

  <rect x="0" y="0" width="1200" height="880" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" class="h1">OpsCoach — AWS architecture</text>
  <text x="600" y="64" text-anchor="middle" class="h2">In-browser &amp; SSH Linux labs · shared ALB/Cognito platform · per-session EC2 hosts · live grading · auto-teardown</text>

  <!-- USER -->
  <text x="38" y="112" class="grp" fill="#5A6B7B">USER</text>
  <rect x="34" y="122" width="156" height="74" rx="9" fill="#FFFFFF" stroke="#5A6B7B" stroke-width="1.6"/>
  <text x="48" y="152" class="svc">Browser</text>
  <text x="48" y="170" class="sub">xterm.js terminal</text>
  <rect x="34" y="300" width="156" height="74" rx="9" fill="#FFFFFF" stroke="#5A6B7B" stroke-width="1.6"/>
  <text x="48" y="330" class="svc">SSH client</text>
  <text x="48" y="348" class="sub">direct opt-in</text>

  <!-- AWS ACCOUNT -->
  <rect x="212" y="92" width="956" height="752" rx="14" fill="#F7FAFC" stroke="#232F3E" stroke-width="1.6" stroke-dasharray="7 5"/>
  <rect x="230" y="104" width="14" height="14" rx="2" fill="#ED7100"/>
  <text x="252" y="116" class="grp" fill="#232F3E">AWS Account · Region (us-east-1)</text>

  <!-- Shared platform band -->
  <rect x="236" y="136" width="712" height="92" rx="10" fill="#FFF8E6" stroke="#E0A800" stroke-width="1.3" stroke-dasharray="6 4"/>
  <text x="250" y="156" class="grp" fill="#9A7B00">Shared platform — imported by the app (not created here)</text>
  <rect x="252" y="166" width="214" height="54" rx="9" fill="#FFFFFF" stroke="#8C4FFF" stroke-width="1.6"/>
  <text x="266" y="190" class="svc">Application Load Balancer</text>
  <text x="266" y="208" class="sub">Cognito auth · routing</text>
  <rect x="486" y="166" width="200" height="54" rx="9" fill="#FFFFFF" stroke="#DD344C" stroke-width="1.6"/>
  <text x="500" y="190" class="svc">Amazon Cognito</text>
  <text x="500" y="208" class="sub">hosted UI · Google IdP</text>

  <!-- VPC -->
  <rect x="236" y="250" width="706" height="586" rx="12" fill="#FFFFFF" stroke="#248823" stroke-width="1.6"/>
  <text x="250" y="272" class="grp" fill="#248823">VPC</text>

  <!-- Public subnet -->
  <rect x="252" y="288" width="672" height="150" rx="9" fill="#EAF7EC" stroke="#67B36A" stroke-width="1"/>
  <text x="266" y="308" class="grp" fill="#2E7D32">Public subnet</text>
  <rect x="272" y="324" width="288" height="96" rx="9" fill="#FFFFFF" stroke="#ED7100" stroke-width="1.6"/>
  <text x="288" y="352" class="svc">EC2 — lab host (per session)</text>
  <text x="288" y="372" class="sub">AL2023 · arm64 · Launch Template</text>
  <text x="288" y="389" class="sub">runs lab container · IMDS blocked</text>

  <!-- Private subnet -->
  <rect x="252" y="454" width="672" height="150" rx="9" fill="#E9F2FC" stroke="#6BA6E0" stroke-width="1"/>
  <text x="266" y="474" class="grp" fill="#1565C0">Private subnet (egress)</text>
  <rect x="272" y="490" width="306" height="96" rx="9" fill="#FFFFFF" stroke="#ED7100" stroke-width="1.6"/>
  <text x="288" y="518" class="svc">ECS Fargate — OpsCoach web</text>
  <text x="288" y="538" class="sub">Next.js + custom Node server</text>
  <text x="288" y="555" class="sub">WebSocket → SSH PTY bridge</text>
  <rect x="606" y="502" width="174" height="72" rx="9" fill="#FFFFFF" stroke="#8C4FFF" stroke-width="1.6"/>
  <text x="620" y="530" class="svc">AWS Cloud Map</text>
  <text x="620" y="549" class="sub">in-VPC discovery</text>

  <!-- Isolated subnet -->
  <rect x="252" y="620" width="672" height="116" rx="9" fill="#F4ECFA" stroke="#B57FD6" stroke-width="1"/>
  <text x="266" y="640" class="grp" fill="#7B2FB5">Isolated subnet</text>
  <rect x="272" y="654" width="306" height="64" rx="9" fill="#FFFFFF" stroke="#2E73B8" stroke-width="1.6"/>
  <text x="288" y="680" class="svc">Amazon RDS — PostgreSQL</text>
  <text x="288" y="699" class="sub">sessions · check runs · results</text>

  <!-- Automation & shared services column -->
  <rect x="962" y="250" width="196" height="586" rx="12" fill="#FBFCFE" stroke="#C7D0D9" stroke-width="1.2" stroke-dasharray="5 4"/>
  <text x="974" y="272" class="grp" fill="#5A6B7B">Automation &amp; services</text>
  <rect x="974" y="288" width="172" height="76" rx="9" fill="#FFFFFF" stroke="#ED7100" stroke-width="1.6"/>
  <text x="988" y="320" class="svc">Amazon ECR</text>
  <text x="988" y="339" class="sub">web + lab images</text>
  <rect x="974" y="384" width="172" height="76" rx="9" fill="#FFFFFF" stroke="#DD344C" stroke-width="1.6"/>
  <text x="988" y="416" class="svc">Secrets Manager</text>
  <text x="988" y="435" class="sub">DB · callback · keys</text>
  <rect x="974" y="480" width="172" height="76" rx="9" fill="#FFFFFF" stroke="#E7157B" stroke-width="1.6"/>
  <text x="988" y="508" class="svc">EventBridge</text>
  <text x="988" y="526" class="svc">Scheduler</text>
  <text x="988" y="544" class="sub">one-shot per session</text>
  <rect x="974" y="576" width="172" height="76" rx="9" fill="#FFFFFF" stroke="#ED7100" stroke-width="1.6"/>
  <text x="988" y="608" class="svc">AWS Lambda</text>
  <text x="988" y="627" class="sub">session terminator</text>

  <!-- ===== FLOWS ===== -->
  <!-- (1) User -> ALB -->
  <path class="flow" d="M190,150 L248,180" marker-end="url(#ae)"/>
  <circle cx="216" cy="159" r="11" fill="#16202C"/><text x="216" y="163" text-anchor="middle" class="badge">1</text>

  <!-- (2) ALB -> Fargate (down the left gutter) -->
  <path class="flow" d="M268,222 L258,250 L258,524 L270,524" marker-end="url(#ae)"/>
  <circle cx="258" cy="392" r="11" fill="#16202C"/><text x="258" y="396" text-anchor="middle" class="badge">2</text>

  <!-- (3) Fargate <-> EC2 (provision / SSH PTY / grade) -->
  <path class="flow" d="M392,490 L392,422" marker-end="url(#ae)" marker-start="url(#as)"/>
  <circle cx="392" cy="456" r="11" fill="#16202C"/><text x="392" y="460" text-anchor="middle" class="badge">3</text>
  <rect x="400" y="448" width="150" height="16" fill="#FFFFFF" opacity="0.92"/>
  <text x="404" y="460" class="albl">provision · SSH PTY · grade</text>

  <!-- (4) EC2 -> Cloud Map -> Fargate (ready/progress webhook) -->
  <path class="flow" d="M512,420 L660,502" marker-end="url(#ae)"/>
  <circle cx="586" cy="461" r="11" fill="#16202C"/><text x="586" y="465" text-anchor="middle" class="badge">4</text>
  <path class="supp" d="M620,574 L578,548" marker-end="url(#aeg)"/>
  <rect x="520" y="430" width="120" height="15" fill="#FFFFFF" opacity="0.9"/>
  <text x="524" y="442" class="albl">ready webhook</text>

  <!-- (5) Browser <-> Fargate (WSS terminal) via far-left gutter -->
  <path class="flow" d="M190,159 L201,159 L201,532 L270,532" marker-end="url(#ae)" marker-start="url(#as)"/>
  <circle cx="201" cy="410" r="11" fill="#16202C"/><text x="201" y="414" text-anchor="middle" class="badge">5</text>
  <rect x="205" y="398" width="44" height="15" fill="#FFFFFF" opacity="0.9"/>
  <text x="208" y="410" class="albl">WSS</text>

  <!-- SSH opt-in (supporting, dashed) -->
  <path class="supp" d="M190,336 L270,372" marker-end="url(#aeg)"/>
  <text x="196" y="360" class="albl" fill="#7A8794">SSH opt-in</text>

  <!-- (6) Scheduler -> Lambda -> EC2 (teardown) -->
  <path class="flow" d="M1060,556 L1060,576" marker-end="url(#ae)"/>
  <path class="flow" d="M972,614 L950,614 L950,372 L560,372" marker-end="url(#ae)"/>
  <circle cx="950" cy="470" r="11" fill="#16202C"/><text x="950" y="474" text-anchor="middle" class="badge">6</text>
  <rect x="690" y="362" width="98" height="15" fill="#FFFFFF" opacity="0.92"/>
  <text x="694" y="374" class="albl">terminate EC2</text>

  <!-- supporting: Fargate -> RDS -->
  <path class="supp" d="M392,586 L392,654" marker-end="url(#aeg)"/>
  <text x="400" y="628" class="albl" fill="#7A8794">SQL</text>

  <!-- supporting: EC2 -> ECR (pull image) -->
  <path class="supp" d="M560,348 L950,330 L972,328" marker-end="url(#aeg)"/>
  <text x="690" y="332" class="albl" fill="#7A8794">pull lab image</text>

  <!-- (Secrets Manager is read by Fargate and the terminator Lambda; omitted from arrows for clarity) -->
</svg>

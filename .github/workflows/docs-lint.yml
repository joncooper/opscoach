name: docs-lint

on:
  push:
    paths:
      - '**/*.md'
      - '.vale.ini'
      - 'styles/**'
      - '.markdownlint.json'
      - '.github/workflows/docs-lint.yml'
  pull_request:
    paths:
      - '**/*.md'
      - '.vale.ini'
      - 'styles/**'
      - '.markdownlint.json'

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: markdownlint (structure)
        run: npx --yes markdownlint-cli2 "**/*.md"

      - name: Install Vale
        run: |
          ver=$(curl -fsSL https://api.github.com/repos/errata-ai/vale/releases/latest | grep -oP '"tag_name":\s*"v\K[^"]+')
          curl -fsSL "https://github.com/errata-ai/vale/releases/download/v${ver}/vale_${ver}_Linux_64-bit.tar.gz" | sudo tar -xz -C /usr/local/bin vale
          vale --version

      - name: Vale (house prose rules)
        run: vale .
